# Standalone flex-2050 config
# Maximum flexibility: highest DSR fractions, longest shift hours,
# lowest DSR store cost, V2G mature and cheap, fully electric transport, net-zero CO2

run:
  prefix: "2026-02"
  name: "flex-2050"
  disable_progressbar: true
  shared_resources:
    policy: false
  shared_cutouts: true
  scenarios:
    enable: false

foresight: overnight

scenario:
  clusters:
    - 37
  opts:
    - ""
  sector_opts:
    - ""
  planning_horizons:
    - "2050"

costs:
  year: 2050

co2_budget:
  2050: 0.0

countries:
  - AT
  - BE
  - BG
  - CH
  - CZ
  - DE
  - DK
  - EE
  - ES
  - FI
  - FR
  - GB
  - GR
  - HR
  - HU
  - IE
  - IT
  - LT
  - LU
  - LV
  - NL
  - "NO"
  - PL
  - PT
  - RO
  - SE
  - SI
  - SK

snapshots:
  start: "2019-01-01"
  end: "2020-01-01"
  inclusive: left

electricity:
  extendable_carriers:
    Generator:
      [
        solar,
        solar-hsat,
        onwind,
        offwind-ac,
        offwind-dc,
        offwind-float,
        OCGT,
        CCGT,
      ]
    StorageUnit: [battery]
    Store: [H2]
    Link: []
  transmission_limit: "v1.25"

atlite:
  default_cutout: europe-2019-sarah3-era5
  cutouts:
    europe-2019-sarah3-era5:
      module: [sarah, era5]
      x: [-12., 35.]
      y: [33., 72.]
      time: ["2019-01-01", "2019-12-31"]

clustering:
  temporal:
    resolution_sector: 3h

transmission_projects:
  include:
    tyndp2020: true
    nep: false
    manual: true
  new_link_capacity: keep

sector:
  gas_network: true
  H2_network: false
  H2_retrofit: false
  reduce_space_heat_exogenously: true
  reduce_space_heat_exogenously_factor:
    2050: 0.286
  district_heating:
    progress:
      2050: 0.8
  residential_heat:
    dsm:
      enable: true
      direction:
        - overheat
        - undercool
      restriction_value:
        2050: 0.4
  hydrogen_turbine: true
  hydrogen_fuel_cell: true
  bev_dsm: true
  v2g: true
  bev_energy: 0.12
  bev_dsm_availability: 0.5
  land_transport_electric_share:
    2050: 1.0
  land_transport_fuel_cell_share:
    2050: 0
  regional_oil_demand: false
  regional_co2_sequestration_potential:
    enable: false
  co2_spatial: false
  co2_network: false
  methanol:
    methanol_to_power:
      ocgt: true
  ammonia: false
  biomass_spatial: false
  biomass_to_liquid: false
  electrobiofuels: false
  dac: false
  limit_max_growth:
    enable: true
    factor: 1.5

industry:
  dsr:
    enable: true
    store_capital_cost: 1.5
    flexibility_fraction:
      "Iron & steel industry|Scrap-EAF": 0.95
      "Iron & steel industry|H2-DRI-EAF": 0.50
      "Iron & steel industry|BF-BOF-CCUS": 0.0
      "Iron & steel industry|Manufacturing": 0.0
      "Iron & steel industry|Aluminium-primary": 0.25
      "Iron & steel industry|Aluminium-secondary": 0.25
      "Iron & steel industry|Alumina": 0.0
      "Non-metallic Minerals|Cement mills": 0.65
      "Non-metallic Minerals|Raw mills": 0.65
      "Non-metallic Minerals|Kiln": 0.0
      "Non-metallic Minerals|Other": 0.0
      "Paper, Pulp and Print|Pulp production": 0.80
      "Paper, Pulp and Print|Paper machines": 0.0
      "Paper, Pulp and Print|Printing": 0.80
      "Non-specified (Industry)|Chlor-alkali": 0.20
      "Non-specified (Industry)|Other chemicals": 0.35
      "Food and Tobacco": 0.30
      "Textile and Leather": 0.30
      "Wood and Wood Products": 0.30
      "Transport Equipment": 0.30
      "Machinery": 0.30
    shift_hours:
      "Iron & steel industry|Scrap-EAF": 4
      "Iron & steel industry|H2-DRI-EAF": 12
      "Iron & steel industry|BF-BOF-CCUS": 0
      "Iron & steel industry|Aluminium-primary": 5
      "Iron & steel industry|Aluminium-secondary": 5
      "Iron & steel industry|Alumina": 0
      "Non-metallic Minerals|Cement mills": 8
      "Non-metallic Minerals|Raw mills": 8
      "Paper, Pulp and Print|Pulp production": 12
      "Paper, Pulp and Print|Printing": 12
      "Non-specified (Industry)|Chlor-alkali": 8
      "Non-specified (Industry)|Other chemicals": 8
      "Food and Tobacco": 8
      "Textile and Leather": 8
      "Wood and Wood Products": 8
      "Transport Equipment": 8
      "Machinery": 8
    restriction_time:
      "Non-specified (Industry)|Other chemicals": [0]
  waste_to_energy: true
  temporal_electricity_industry_load: true

adjustments:
  sector:
    factor:
      Link:
        electricity distribution grid:
          capital_cost: 1.0
    absolute:
      Link:
        V2G:
          marginal_cost: 30

solving:
  solver:
    name: gurobi
    options: gurobi-default
  mem_mb: 128000
  runtime: 48h

plotting:
  map:
    boundaries:
  eu_node_location:
    x: 10.0
    y: 50.0
  costs_max: 1000
  costs_threshold: 0.0000001
  energy_max:
  energy_min:
  energy_threshold: 0.000001
