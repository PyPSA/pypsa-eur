tutorial: true

run:
  name: test-elec
  disable_progressbar: true
  shared_resources:
    policy: false

countries:
- BE

snapshots:
  start: "2013-03-01"
  end: "2013-03-08"

co2_budget:
  relative: false
  upper:
    2020: 0.72
    2025: 0.648
    2030: 0.45
    2035: 0.25
    2040: 0.1
    2045: 0.05
    2050: 0.001

electricity:
  gaslimit_enable: false
  gaslimit: 0
  transmission_limit: vopt
  extendable_carriers:
    Generator:
    - solar
    - solar-hsat
    - onwind
    - offwind-ac
    - offwind-dc
    - offwind-float
    - OCGT
    - CCGT
    - nuclear
    StorageUnit:
    - battery
    Store:
    - H2
    Link:
    - H2 pipeline
  renewable_carriers:
  - solar
  - solar-hsat
  - onwind
  - offwind-ac
  - offwind-dc
  - offwind-float
  estimate_renewable_capacities:
    enable: true
    from_powerplantmatching: true
    year: 2020
    expansion_limit: false
    technology_mapping:
      Offshore: offwind-ac
      Onshore: onwind
      PV: solar

atlite:
  default_cutout: be-03-2013-era5
  cutouts:
    be-03-2013-era5:
      module: era5
      x:
      - 4.0
      - 15.0
      y:
      - 46.0
      - 56.0
      time:
      - "2013-03-01"
      - "2013-03-08"

renewable:
  offwind-ac:
    max_depth: false
  offwind-dc:
    max_depth: false
  offwind-float:
    max_depth: false
    min_depth: false

clustering:
  exclude_carriers:
  - OCGT
  - offwind-ac
  - coal
  temporal:
    averaging: 24
  cluster_network:
    n_clusters: 5

lines:
  s_nom_max: .inf
  s_nom_max_extension: 20000
  dynamic_line_rating:
    activate: true
    max_line_rating: 1.3

sector:
  enabled: false

solving:
  solver:
    name: highs
    options: highs-default
  check_objective:
    enable: true
    expected_value: 74395010.28
  options:
    transmission_losses: 0

conventional:
  dynamic_fuel_price: false
  unit_commitment: false
  nuclear:
    p_max_pu: data/nuclear_p_max_pu.csv

plotting:
  costs_max: auto
  costs_threshold: 0.001
  energy_max: auto
  energy_min: auto
  energy_threshold: 0.00001
  balance_map:
    bus_carriers:
    - AC
  balance_map_interactive:
    bus_carriers:
    - AC
