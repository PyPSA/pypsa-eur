# Temporal industry profiles WITHOUT DSR (baseline for comparison).
# Also disables residential heat DSM for a clean no-flexibility baseline.
# Usage: snakemake --configfile config/config.default.yaml config/test/config.eu_38_2030_base.yaml config/test/config.temporal_no_dsr.yaml

run:
  name: "EU_test_run_temporal_no_dsr"

sector:
  residential_heat:
    dsm:
      enable: false

industry:
  dsr:
    enable: false
